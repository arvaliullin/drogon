version: "3.8"

services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks:
      - drogon_network

  producer:
    build:
      context: .
      dockerfile: deployments/Dockerfile.examples
    container_name: producer
    depends_on:
      - rabbitmq
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    command: ["/app/producer"]
    networks:
      - drogon_network

  consumer:
    build:
      context: .
      dockerfile: deployments/Dockerfile.examples
    container_name: consumer
    depends_on:
      - rabbitmq
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    command: ["/app/consumer"]
    networks:
      - drogon_network

  helloworld:
    build:
      context: .
      dockerfile: deployments/Dockerfile
    container_name: helloworld
    command: ["bun", "run", "start"]
    ports:
      - "3000:3000"
    networks:
      - drogon_network

networks:
  drogon_network:
    driver: bridge
